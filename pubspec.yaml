name: cekici
description: Tow Truck on-demand app (Uber-style)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend & Auth
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Maps & Location
  latlong2: ^0.9.0
  flutter_map: ^7.0.2
  geolocator: ^14.0.2
  geolocator_android: ^5.0.2
  flutter_background_geolocation: ^4.16.4

  # Real-time
  socket_io_client: ^3.0.2

  # HTTP for routing APIs (OSRM / Mapbox)
  http: ^1.2.2

  # Audio for driver job alert
  audioplayers: ^6.1.0
  # Open maps URL (Google Maps, etc.)
  url_launcher: ^6.3.0
  map_launcher: ^4.0.0

  # Proof of work: camera + compress + signature
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  flutter_signature_pad: ^3.0.1
  path_provider: ^2.1.2
  path: ^1.9.0

  # Driver wallet & earnings charts
  fl_chart: ^0.66.0

  # Phone auth
  country_code_picker: ^3.0.0

  # Receipt / invoice PDF
  pdf: ^3.11.1
  printing: ^5.13.0

  # Push notifications (optional: run flutterfire configure and add google-services.json)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  firebase_crashlytics: ^4.1.3

  # Error handling & connectivity
  connectivity_plus: ^6.0.5
  sentry_flutter: ^8.9.1
  device_info_plus: ^11.1.0

  # Driver onboarding persistence + Lottie
  shared_preferences: ^2.3.3
  lottie: ^3.1.3

  # i18n
  easy_localization: ^3.0.7

  # Legal documents (full-screen HTML)
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/lottie/
    - assets/translations/
    - assets/legal/
