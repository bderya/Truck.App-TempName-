name: cekici
description: Tow Truck on-demand app (Uber-style)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend & Auth
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Maps & Location
  latlong2: ^0.9.0
  flutter_map: ^7.0.2
  geolocator: ^14.0.2

  # Real-time
  socket_io_client: ^3.0.2

  # HTTP for routing APIs (OSRM / Mapbox)
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
